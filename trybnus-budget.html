  <script>
  window.onerror = function(msg, src, line) {
    document.getElementById('root').innerHTML = '<div style="color:#d4af37;padding:24px;font-family:monospace;font-size:12px;background:#0a0f0b;min-height:100vh;"><div style="font-size:16px;margin-bottom:16px;">ERROR</div>' + msg + '<br><br>Line: ' + line + '</div>';
    return true;
  };
  window.storage = {
    get: (k) => { try { const v=localStorage.getItem(k); return Promise.resolve(v?{key:k,value:v}:null); } catch(e){return Promise.resolve(null);} },
    set: (k,v) => { try { localStorage.setItem(k,v); return Promise.resolve({key:k,value:v}); } catch(e){return Promise.resolve(null);} },
    delete: (k) => { try { localStorage.removeItem(k); return Promise.resolve({key:k,deleted:true}); } catch(e){return Promise.resolve(null);} }
  };

  <script>
const C = {
    bg: "#0a0f0b", bgCard: "#0f1711", bgElevated: "#16211a",
    borderDim: "#1c2a20", border: "#2e4636",

    gold: "#d4af37", goldBright: "#f0d860", goldDim: "#8a7220",
    white: "#eef5ee", whiteDim: "#c0ccc0",
    silver: "#88988a", silverDim: "#586858", danger: "#c0392b", dangerBright: "#e74c3c",
};
const DEFAULT_CATEGORIES = ["Housing", "Utilities", "Groceries", "Transportation", "Insurance", "Loans", "Supplements", "Phone", "Subscriptions", "Other"];
async function loadData(key, fb) {
    try {
        const r = await window.storage.get(key);
        return r ? JSON.parse(r.value) : fb;
    }
    catch (_a) {
        return fb;
    }
}
async function saveData(key, val) {
    try {
        await window.storage.set(key, JSON.stringify(val));
    }
    catch (_a) { }
}
function monthKey() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; }
function fmt(n) { return "$" + (n || 0).toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function fmtC(n) { return "$" + (n || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function Card({ children, style, glow }) {
    return React.createElement("div", { style: Object.assign({ background: C.bgCard, borderRadius: 14, border: `1px solid ${glow ? C.gold + "55" : C.borderDim}`, padding: 16, boxShadow: glow ? `0 0 20px ${C.greenGlow}` : "none" }, style) }, children);
}
function Eyebrow({ children, color }) {

}
function Btn({ children, onClick, color, outline, style, small }) {
    return React.createElement("button", { onClick: onClick, style: Object.assign({ padding: small ? "7px 14px" : "12px 20px", borderRadius: 10, border: outline ? `1px solid ${color || C.green}` : "none", background: outline ? "transparent" : (color || C.green), color: outline ? (color || C.green) : "#fff", fontWeight: 700, fontSize: small ? 12 : 14, cursor: "pointer" }, style) }, children);
}
function Field({ value, onChange, placeholder, type, prefix }) {
    return (React.createElement("div", { style: { display: "flex", alignItems: "center", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "0 12px" } },
        prefix && React.createElement("span", { style: { color: C.silverDim, fontSize: 15, marginRight: 4 } }, prefix),
        React.createElement("input", { value: value, onChange: onChange, placeholder: placeholder, type: type || "text", inputMode: type === "number" ? "decimal" : "text", style: { flex: 1, background: "transparent", border: "none", color: C.white, padding: "11px 0", fontSize: 15, outline: "none", width: "100%" } })));
}
// ── OVERVIEW ──────────────────────────────────────────────────────────────────
function Overview({ income, bills, spending, debts, goals, onNav }) {
    const month = monthKey();
    const monthSpending = (spending[month] || []).reduce((s, e) => s + e.amount, 0);
    const totalBills = bills.reduce((s, b) => s + b.amount, 0);
    const totalOut = totalBills + monthSpending;
    const left = income - totalOut;
    const totalDebt = debts.reduce((s, d) => s + d.balance, 0);
    const hour = new Date().getHours();
    const greeting = hour < 12 ? "Good morning" : hour < 18 ? "Good afternoon" : "Good evening";
    const tile = (label, value, color, navTo, sub) => (React.createElement("button", { onClick: () => onNav(navTo), style: { background: C.bgCard, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 16, textAlign: "left", cursor: "pointer", display: "flex", flexDirection: "column", gap: 3 } },
        React.createElement("div", { style: { fontSize: 10, fontWeight: 800, letterSpacing: 1.5, textTransform: "uppercase", color: C.silverDim } }, label),

        sub && React.createElement("div", { style: { fontSize: 11, color: C.silverDim } }, sub)));
    return (React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
        React.createElement(Card, { glow: true },
            React.createElement("div", { style: { fontSize: 13, color: C.silverDim } },

            React.createElement(Eyebrow, { color: C.goldBright }, "Money Left This Month"),

            React.createElement("div", { style: { marginTop: 8, height: 8, background: C.bgElevated, borderRadius: 4, overflow: "hidden" } },
                React.createElement("div", { style: { height: "100%", width: `${income ? Math.min(100, (totalOut / income) * 100) : 0}%`, background: left >= 0 ? C.green : C.danger, transition: "width 0.3s" } })),
            React.createElement("div", { style: { display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 12, color: C.silverDim } },
                React.createElement("span", null,
                    "In: ",
                    React.createElement("span", { style: { color: C.greenBright } }, fmt(income))),
                React.createElement("span", null,
                    "Out: ",
                    React.createElement("span", { style: { color: C.gold } }, fmt(totalOut))))),
        React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 } },
            tile("Fixed Bills", fmt(totalBills), C.gold, "budget", `${bills.length} bills`),

            tile("Total Debt", fmt(totalDebt), C.dangerBright, "debt", `${debts.length} accounts`),
            tile("Goals", `${goals.length}`, C.greenBright, "goals", "active"))));
}
// ── BUDGET ────────────────────────────────────────────────────────────────────
function Budget({ income, bills, onSetIncome, onAddBill, onRemoveBill }) {

    const [name, setName] = React.useState("");
    const [amount, setAmount] = React.useState("");
    const [cat, setCat] = React.useState("Housing");
    const totalBills = bills.reduce((s, b) => s + b.amount, 0);
    const left = income - totalBills;
    const handleAdd = () => {
        if (!name.trim() || !amount)
            return;
        onAddBill({ id: Date.now().toString(), name: name.trim(), amount: parseFloat(amount), cat });
        setName("");

    // Group bills by category
